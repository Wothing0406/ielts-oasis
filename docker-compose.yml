services:
  # --- Database Service ---
  db:
    image: mysql:8.0
    container_name: ielts_oasis_db
    restart: always
    environment:
      MYSQL_DATABASE: ielts_oasis
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ielts-network

  # --- Backend Service (FastAPI) ---
  backend:
    build: ./backend
    container_name: ielts_oasis_backend
    restart: always
    environment:
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_NAME=ielts_oasis
      - OLLAMA_HOST=http://ollama:11434
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --timeout-keep-alive 300
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - ielts-network

  # --- Discord Bot Service ---
  discord_bot:
    build: ./backend
    container_name: ielts_oasis_discord_bot
    restart: always
    environment:
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_NAME=ielts_oasis
      - OLLAMA_HOST=http://ollama:11434
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: python bot.py
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ielts-network

  # --- Frontend Service (Next.js) ---
  web:
    build: ./frontend
    container_name: ielts_oasis_web
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - ielts-network

  # --- Local AI Service (Ollama) ---
  ollama:
    image: ollama/ollama:latest
    container_name: ielts_oasis_ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ielts-network
    # Pull tinyllama and moondream (vision) for reliable local fallback
    entrypoint: [ "/usr/bin/bash", "-c", "ollama serve & sleep 10 && ollama run tinyllama && ollama run moondream && ollama run phi3 && wait" ]

  # --- Public Access (Ngrok Tunnel) ---
  tunnel:
    image: ngrok/ngrok:latest
    container_name: ielts_oasis_tunnel
    restart: always
    environment:
      - NGROK_AUTHTOKEN=3EmAQdviM8qcEuvyHlqTVWB4HAy_2wz9vu1uZ5Hr5PnLv1fEK
    command: "http http://web:3000 --domain=drudge-amount-charting.ngrok-free.dev --log=stdout"
    depends_on:
      - web
    networks:
      - ielts-network

networks:
  ielts-network:
    driver: bridge

volumes:
  db_data:
  ollama_data:
