name: Render Mermaid Diagrams

on:
  push:
    branches:
      - main
    paths:
      - 'architecture.mmd'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Configure Puppeteer
        run: echo '{"args": ["--no-sandbox", "--disable-setuid-sandbox"]}' > puppeteer-config.json

      - name: Compile Mermaid diagram
        run: mmdc -i architecture.mmd -o architecture.svg -p puppeteer-config.json

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: render mermaid diagrams to svg for kaggle"
          file_pattern: "architecture.svg"
